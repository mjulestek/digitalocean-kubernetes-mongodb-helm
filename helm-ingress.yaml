apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: mongo-express
spec:
  ingressClassName: nginx
  rules:
  - host: 172-104-231-41.ip.linodeusercontent.com
    http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: mongo-express-service
              port:
                number: 8081
